services:
  postgres:
    image: postgres:16-alpine
    container_name: fulmen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FULMEN_POSTGRES_DB:-fulmen}
      POSTGRES_USER: ${FULMEN_POSTGRES_USER:-fulmen}
      POSTGRES_PASSWORD: ${FULMEN_POSTGRES_PASSWORD:-fulmen}
    ports:
      - '5432:5432'
    volumes:
      - fulmen-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fulmen-postgres-data:
